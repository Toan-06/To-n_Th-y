<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WanderViệt — Chuyến Đi Của Tôi</title>
  <meta name="description" content="Quản lý tour du lịch đã đặt và các chuyến đi AI lên kế hoạch của bạn." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="global-tokens.css?v=3" />
  <link rel="stylesheet" href="styles.css?v=3" />
  <style>
    /* ── Page Layout ── */
    body { background: var(--bg, #0a0f1e); color: var(--text, #e2e8f0); font-family: 'Be Vietnam Pro', sans-serif; }

    .trips-hero {
      background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 60%, #1a0a2e 100%);
      padding: 5rem 0 2.5rem;
      position: relative; overflow: hidden;
    }
    .trips-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 30%, rgba(20,184,166,.1) 0%, transparent 50%);
      pointer-events: none;
    }
    .trips-hero h1 { font-family: 'Outfit', sans-serif; font-size: clamp(1.8rem,4vw,2.6rem); margin: 0 0 .5rem; }
    .trips-hero p { color: #94a3b8; font-size: .95rem; margin: 0; }

    /* ── Main Tab Toggle ── */
    .main-tab-wrap {
      display: flex; gap: .75rem;
      margin: 2rem 0 1.5rem;
      border-bottom: 2px solid rgba(255,255,255,.07);
      padding-bottom: 0;
    }
    .main-tab {
      padding: .75rem 1.5rem; border-radius: 12px 12px 0 0;
      border: none; background: transparent; cursor: pointer;
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1rem;
      color: #64748b; transition: all .2s; position: relative; bottom: -2px;
      border-bottom: 3px solid transparent;
    }
    .main-tab:hover { color: #94a3b8; background: rgba(255,255,255,.04); }
    .main-tab.active { color: white; border-bottom-color: var(--accent-primary, #6366f1); background: rgba(99,102,241,.08); }
    .main-tab .tab-badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(99,102,241,.25); color: #818cf8;
      border-radius: 50px; font-size: .72rem; font-weight: 800;
      padding: .1rem .5rem; margin-left: .4rem;
    }
    .main-tab.active .tab-badge { background: #6366f1; color: #fff; }

    /* ── Sub Tabs ── */
    .sub-tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .sub-tab {
      padding: .45rem 1.1rem; border-radius: 50px;
      border: 1.5px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.04); color: #94a3b8;
      font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .2s;
    }
    .sub-tab:hover { border-color: rgba(255,255,255,.25); color: #fff; }
    .sub-tab.active { background: white; color: #0f172a; border-color: white; }

    .sub-tab.danger.active { background: #ef4444; color: #fff; border-color: #ef4444; }

    /* ── Section Panel ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Booking Card ── */
    .booking-card {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .booking-card:hover { border-color: rgba(99,102,241,.35); box-shadow: 0 8px 32px rgba(0,0,0,.3); }
    .booking-card__head { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: .75rem; margin-bottom: 1rem; }
    .booking-card__title { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 700; color: #fff; margin: 0 0 .3rem; }
    .booking-card__meta { font-size: .85rem; color: #64748b; display: flex; flex-wrap: wrap; gap: .75rem; }
    .booking-card__meta span { display: flex; align-items: center; gap: .3rem; }
    .booking-card__actions { display: flex; gap: .5rem; flex-wrap: wrap; }

    /* Status badges */
    .badge-status {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .25rem .8rem; border-radius: 50px; font-size: .78rem; font-weight: 700;
    }
    .badge-pending  { background: rgba(245,158,11,.15); color: #f59e0b; }
    .badge-confirmed{ background: rgba(16,185,129,.15); color: #10b981; }
    .badge-cancelled{ background: rgba(239,68,68,.15);  color: #ef4444; }
    .badge-completed{ background: rgba(99,102,241,.15); color: #818cf8; }
    .badge-unpaid   { background: rgba(239,68,68,.12);  color: #f87171; }
    .badge-paid     { background: rgba(16,185,129,.12); color: #6ee7b7; }

    /* Payment method icon */
    .pm-icon { font-size: 1.1rem; }

    /* ── Trip Card (AI) ── */
    .trip-card {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem;
      transition: all .2s;
    }
    .trip-card:hover { border-color: rgba(20,184,166,.3); box-shadow: 0 8px 32px rgba(0,0,0,.3); }

    /* ── Action Buttons ── */
    .btn-sm {
      padding: .45rem 1rem; border-radius: 10px; font-size: .82rem; font-weight: 700;
      cursor: pointer; transition: all .2s; border: 1.5px solid transparent;
    }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-outline { background: transparent; border-color: rgba(255,255,255,.15); color: #94a3b8; }
    .btn-outline:hover { border-color: rgba(255,255,255,.35); color: #fff; }
    .btn-danger { background: transparent; border-color: rgba(239,68,68,.3); color: #ef4444; }
    .btn-danger:hover { background: rgba(239,68,68,.1); }
    .btn-success { background: transparent; border-color: rgba(16,185,129,.3); color: #10b981; }
    .btn-success:hover { background: rgba(16,185,129,.1); }

    /* ── Empty State ── */
    .empty-state { text-align: center; padding: 4rem 2rem; color: #64748b; }
    .empty-state__icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .empty-state h3 { font-size: 1.2rem; color: #94a3b8; margin-bottom: .5rem; }

    /* ── Loading ── */
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(99,102,241,.15); border-top-color: #6366f1; border-radius: 50%; animation: spin .8s linear infinite; margin: 3rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Unauth ── */
    .unauth-box { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 20px; padding: 4rem 2rem; text-align: center; }
    .unauth-box h2 { color: #f43f5e; margin-bottom: .75rem; }
    .unauth-box p { color: #64748b; margin-bottom: 2rem; }

    /* Price highlight */
    .price-hl { color: #fbbf24; font-weight: 800; }

    @media (max-width: 600px) {
      .main-tab { padding: .6rem 1rem; font-size: .88rem; }
      .booking-card { padding: 1rem; }
    }
  </style>
</head>
<body>
  <header class="site-header" id="header-container"></header>

  <main>
    <!-- Hero -->
    <section class="trips-hero">
      <div class="container" style="position:relative;z-index:1;">
        <h1>🎒 Chuyến Đi Của Tôi</h1>
        <p>Quản lý tour du lịch đã đặt và các lịch trình do AI lên kế hoạch cho bạn.</p>
      </div>
    </section>

    <section style="padding-bottom:4rem;">
      <div class="container" style="max-width:900px;">

        <!-- Unauth -->
        <div id="unauthorizedMsg" style="display:none;margin-top:2rem;" class="unauth-box">
          <h2>Bạn chưa đăng nhập!</h2>
          <p>Vui lòng đăng nhập để xem lại các chuyến đi của bạn.</p>
          <a href="index.html" class="btn btn--primary">Quay lại đăng nhập</a>
        </div>

        <!-- Main content -->
        <div id="tripsContainer" style="display:none;">

          <!-- Main Tabs -->
          <div class="main-tab-wrap">
            <button class="main-tab active" data-main-tab="tours">
              🗺️ Tour Du Lịch
              <span class="tab-badge" id="badge-tours">0</span>
            </button>
            <button class="main-tab" data-main-tab="mytrips">
              🤖 Chuyến Đi Của Tôi
              <span class="tab-badge" id="badge-mytrips">0</span>
            </button>
          </div>

          <!-- ═══ PANEL: TOUR DU LỊCH ═══ -->
          <div class="tab-panel active" id="panel-tours">
            <div class="sub-tabs">
              <button class="sub-tab active" data-tour-tab="pending">⏳ Chờ xác nhận</button>
              <button class="sub-tab" data-tour-tab="confirmed">✅ Đã xác nhận</button>
              <button class="sub-tab" data-tour-tab="completed">🏁 Hoàn thành</button>
              <button class="sub-tab danger" data-tour-tab="cancelled">🚫 Đã hủy</button>
            </div>
            <div id="toursList"><div class="spinner"></div></div>
          </div>

          <!-- ═══ PANEL: CHUYẾN ĐI CỦA TÔI ═══ -->
          <div class="tab-panel" id="panel-mytrips">
            <div class="sub-tabs">
              <button class="sub-tab active" data-trip-tab="planned">📅 Đang lên lịch</button>
              <button class="sub-tab" data-trip-tab="experienced">✅ Đã đi</button>
              <button class="sub-tab" data-trip-tab="missed">❌ Bỏ lỡ</button>
              <button class="sub-tab danger" data-trip-tab="deleted">🗑️ Thùng rác</button>
            </div>
            <div id="tripsList"><div class="spinner"></div></div>
          </div>

        </div>
      </div>
    </section>
  </main>

  <!-- Cancel Confirm Modal -->
  <div id="cancelModal" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);align-items:center;justify-content:center;">
    <div style="background:#1e293b;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:2rem;max-width:400px;width:90%;text-align:center;">
      <p style="font-size:2rem;margin-bottom:.5rem;">❓</p>
      <h3 style="margin-bottom:.75rem;font-family:'Outfit',sans-serif;">Hủy đặt lịch?</h3>
      <p style="color:#94a3b8;margin-bottom:1.5rem;font-size:.9rem;">Bạn có chắc muốn hủy đơn này? Hành động này không thể hoàn tác.</p>
      <div style="display:flex;gap:.75rem;justify-content:center;">
        <button class="btn-sm btn-outline" onclick="closeCancelModal()">Không, giữ lại</button>
        <button class="btn-sm btn-danger" id="confirmCancelBtn" style="background:#ef4444;color:#fff;border-color:#ef4444;">Xác nhận hủy</button>
      </div>
    </div>
  </div>

  <script src="SharedUI.js?v=3"></script>
  <script src="my-trips-tabs.js"></script>
  <script>
  (function() {
    var token = localStorage.getItem('wander_token');
    if (!token) {
      document.getElementById('unauthorizedMsg').style.display = 'block';
      return;
    }
    document.getElementById('tripsContainer').style.display = 'block';

    var currentTourTab = 'pending';
    var currentTripTab = 'planned';
    var allBookings = [];
    var cancelTargetId = null;

    // ── Payment method labels ──
    var PM_LABELS = { contact: '📞 Liên hệ', transfer: '🏦 Chuyển khoản', momo: '💜 MoMo', zalopay: '💙 ZaloPay', card: '💳 Thẻ ngân hàng' };

    // ── Format helpers ──
    function fmtDate(d) { return d ? new Date(d).toLocaleDateString('vi-VN') : '—'; }
    function fmtPrice(n) {
      if (!n || n === 0) return 'Liên hệ báo giá';
      if (n >= 1000000) return (n/1000000).toFixed(1).replace('.0','') + 'M ₫';
      if (n >= 1000) return Math.round(n/1000) + 'K ₫';
      return n.toLocaleString('vi-VN') + ' ₫';
    }
    function statusBadge(s) {
      var map = { pending:'badge-pending', confirmed:'badge-confirmed', cancelled:'badge-cancelled', completed:'badge-completed' };
      var lbl = { pending:'⏳ Chờ xác nhận', confirmed:'✅ Đã xác nhận', cancelled:'🚫 Đã hủy', completed:'🏁 Hoàn thành' };
      return '<span class="badge-status ' + (map[s]||'badge-pending') + '">' + (lbl[s]||s) + '</span>';
    }
    function payBadge(s) {
      return s === 'paid'
        ? '<span class="badge-status badge-paid">💰 Đã thanh toán</span>'
        : '<span class="badge-status badge-unpaid">⚠️ Chưa thanh toán</span>';
    }

    // ── Load Tours (bookings type=tour + service) ──
    function loadTours() {
      var list = document.getElementById('toursList');
      list.innerHTML = '<div class="spinner"></div>';
      fetch('/api/bookings/my', { headers: { 'x-auth-token': token } })
        .then(function(r){ return r.json(); })
        .then(function(json) {
          allBookings = (json.success && json.data) ? json.data : [];
          document.getElementById('badge-tours').textContent = allBookings.length;
          renderTourTab(currentTourTab);
        })
        .catch(function() { list.innerHTML = '<div class="empty-state"><p style="color:#ef4444;">Lỗi tải dữ liệu</p></div>'; });
    }

    function renderTourTab(tab) {
      currentTourTab = tab;
      var list = document.getElementById('toursList');
      var filtered = allBookings.filter(function(b){ return b.status === tab; });
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state__icon">📭</div><h3>Chưa có đơn nào trong mục này</h3><p>Khám phá các tour trên trang <a href="business-services.html" style="color:#6366f1;">Dịch vụ đối tác</a></p></div>';
        return;
      }
      list.innerHTML = filtered.map(function(b) {
        var isService = b.bookingType === 'service';
        var actions = '';
        if (b.status === 'pending' || b.status === 'confirmed') {
          actions += '<button class="btn-sm btn-danger" onclick="openCancelModal(\'' + b._id + '\')">Hủy đặt</button>';
        }
        if (b.paymentStatus !== 'paid' && b.totalPrice > 0 && b.status !== 'cancelled') {
          actions += '<button class="btn-sm btn-success" onclick="payBooking(\'' + b.bookingId + '\')">Thanh toán</button>';
        }
        return '<div class="booking-card">' +
          '<div class="booking-card__head">' +
            '<div>' +
              '<div style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-bottom:.4rem;">' +
                '<h3 class="booking-card__title">' + (b.placeName || 'Dịch vụ') + '</h3>' +
                statusBadge(b.status) +
                payBadge(b.paymentStatus || 'unpaid') +
              '</div>' +
              '<div class="booking-card__meta">' +
                '<span>🎫 #' + b.bookingId + '</span>' +
                '<span>👤 ' + b.customerName + '</span>' +
                '<span>📞 ' + (b.customerPhone || '—') + '</span>' +
                (b.tourDate ? '<span>🛫 Khởi hành: ' + fmtDate(b.tourDate) + '</span>' : '') +
                '<span>👥 ' + (b.peopleCount||1) + ' người</span>' +
                '<span class="price-hl">💰 ' + fmtPrice(b.totalPrice) + '</span>' +
                '<span>' + (PM_LABELS[b.paymentMethod]||'📞 Liên hệ') + '</span>' +
              '</div>' +
              (b.specialRequests ? '<p style="margin:.5rem 0 0;font-size:.85rem;color:#94a3b8;">📝 ' + b.specialRequests + '</p>' : '') +
            '</div>' +
            '<div class="booking-card__actions">' + actions + '</div>' +
          '</div>' +
          '<div style="font-size:.78rem;color:#475569;border-top:1px solid rgba(255,255,255,.06);padding-top:.75rem;margin-top:.5rem;">' +
            '📅 Đặt ngày ' + fmtDate(b.createdAt) +
            (b.notes ? ' · 📌 ' + b.notes : '') +
          '</div>' +
        '</div>';
      }).join('');
    }

    // ── Cancel booking ──
    window.openCancelModal = function(id) {
      cancelTargetId = id;
      var el = document.getElementById('cancelModal');
      el.style.display = 'flex';
    };
    window.closeCancelModal = function() {
      cancelTargetId = null;
      document.getElementById('cancelModal').style.display = 'none';
    };
    document.getElementById('confirmCancelBtn').addEventListener('click', function() {
      if (!cancelTargetId) return;
      fetch('/api/bookings/' + cancelTargetId + '/cancel', { method: 'PUT', headers: { 'x-auth-token': token } })
        .then(function(r){ return r.json(); })
        .then(function(json) {
          closeCancelModal();
          if (json.success) { WanderUI.showToast('Đã hủy đặt lịch!', 'info'); loadTours(); }
          else WanderUI.showToast(json.message || 'Lỗi!', 'error');
        });
    });

    // ── Pay booking ──
    window.payBooking = function(bookingId) {
      window.location.href = 'payment.html?pay=' + bookingId;
    };

    // ── Sub-tab wiring for tours ──
    document.querySelectorAll('[data-tour-tab]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('[data-tour-tab]').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        renderTourTab(btn.dataset.tourTab);
      });
    });

    // ── Main tab toggle ──
    document.querySelectorAll('[data-main-tab]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('[data-main-tab]').forEach(function(b){ b.classList.remove('active'); });
        document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.mainTab).classList.add('active');
        if (btn.dataset.mainTab === 'tours') loadTours();
      });
    });

    // ── Load AI Trips (reusing my-trips-tabs.js logic) ──
    // my-trips-tabs.js listens for data-trip-tab and renders into #tripsList
    // We just need to trigger initial load
    setTimeout(function() {
      var firstTripTab = document.querySelector('[data-trip-tab="planned"]');
      if (firstTripTab && typeof loadTab === 'function') {
        document.getElementById('badge-mytrips').textContent = '';
        // loadTab is defined in my-trips-tabs.js
      }
    }, 300);

    // Initial load
    loadTours();
  })();
  </script>
</body>
</html>
