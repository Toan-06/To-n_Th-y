<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang cá nhân — WanderViệt</title>
    <link rel="stylesheet" href="global-tokens.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="site-header" id="header-container"></header>

    <main class="profile-page">
        <!-- Header Hồ sơ -->
        <div class="profile-header-section">
            <div class="profile-cover" id="profile-cover-bg">
                <div class="cover-edit-wrapper">
                    <button class="btn-edit-cover" id="btn-edit-cover">
                        <i class="fas fa-camera"></i> <span>Chỉnh sửa ảnh bìa</span>
                    </button>
                    <div class="cover-edit-menu" id="cover-edit-menu">
                        <button onclick="document.getElementById('cover-input').click()"><i class="fas fa-upload"></i> Tải ảnh lên</button>
                        <button onclick="UserProfile.openPhotoPicker()"><i class="fas fa-images"></i> Chọn từ ảnh của bạn</button>
                    </div>
                </div>
            </div>
            
            <div class="container">
                <div class="profile-main-info">
                    <div class="profile-avatar-wrapper">
                        <div class="profile-avatar-circle">
                            <img src="assets/default-avatar.svg" id="user-avatar-big" alt="Avatar">
                        </div>
                        <button class="btn-change-avatar" id="btn-change-avatar" title="Đổi ảnh đại diện"><i class="fas fa-camera"></i></button>
                    </div>

                    <div class="profile-header-details">
                        <div class="profile-text-info">
                            <h1 id="user-display-name">Đang tải...</h1>
                            <p id="user-bio" class="user-bio">Chưa có tiểu sử.</p>
                            <div class="profile-meta">
                                <span id="user-id-tag" class="meta-link">🆔 user...</span>
                                <span id="user-rank-badge" class="meta-link">🏆 Hạng Đồng I</span>
                            </div>
                        </div>
                        <div class="profile-header-actions">
                            <button class="btn btn--primary" id="edit-profile-btn">✏️ Chỉnh sửa hồ sơ</button>
                            <div id="profile-social-btns" style="display:none;gap:12px;">
                                <button class="btn btn--primary" id="btn-add-friend">➕ Kết bạn</button>
                                <button class="btn btn--secondary" id="btn-send-message" style="display:none;">💬 Nhắn tin</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Navigation Tabs -->
            <div class="profile-tabs-container">
                <div class="container">
                    <div class="profile-tabs">
                        <button class="tab-item active" data-tab="diary">📖 Nhật ký</button>
                        <button class="tab-item" data-tab="trips">🎒 Chuyến đi</button>
                        <button class="tab-item" data-tab="friends">👥 Bạn bè</button>
                        <button class="tab-item" data-tab="medals">🏆 Thành tích</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="container profile-content-layout">
            <!-- Cột Trái: Thông tin giới thiệu (Sticky) -->
            <aside class="profile-aside">
                <div class="premium-card info-card">
                    <h4>Giới thiệu</h4>
                    <ul class="info-list">
                        <li><span>📍 Sống tại</span> <strong id="user-location">Việt Nam</strong></li>
                        <li><span>📅 Tham gia từ</span> <strong id="user-joined">04/2024</strong></li>
                        <li><span>⭐ Điểm tích lũy</span> <strong id="user-points">0</strong></li>
                    </ul>
                    <button class="btn btn--full btn--ghost" style="margin-top:20px; border-radius:14px;">Chỉnh sửa chi tiết</button>
                </div>

                <div class="premium-card photos-card">
                    <div class="card-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h4 style="margin:0;">Ảnh</h4>
                        <a href="#" class="blue-link" style="font-size:0.9rem; font-weight:600; text-decoration:none; color:var(--primary);">Xem tất cả</a>
                    </div>
                    <div class="photos-grid" id="profile-photos-preview">
                        <!-- Injected via JS -->
                    </div>
                </div>
            </aside>

            <!-- Cột Phải: Nội dung Tab -->
            <section class="profile-main-feed" id="profile-tab-content">
                <div class="shimmer-container" style="padding:0;">
                    <div class="loading-shimmer" style="height:150px;border-radius:24px;margin-bottom:20px;"></div>
                    <div class="loading-shimmer" style="height:100px;border-radius:24px;margin-bottom:20px;width:80%;"></div>
                    <div class="loading-shimmer" style="height:120px;border-radius:24px;width:60%;"></div>
                </div>
            </section>

            <!-- Hidden Inputs for Media -->
            <input type="file" id="avatar-input" accept="image/*" style="display:none;">
            <input type="file" id="cover-input" accept="image/*" style="display:none;">
        </div>
    </main>



    <div id="photo-picker-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content photo-picker-card">
            <div class="modal-header">
                <h3>Chọn ảnh của bạn</h3>
                <button class="btn-close-modal" onclick="UserProfile.closePhotoPicker()">×</button>
            </div>
            <div class="photo-picker-grid" id="photo-picker-grid">
                <!-- Images will be injected here -->
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="edit-profile-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content edit-profile-card">
            <div class="modal-header">
                <h3>Chỉnh sửa hồ sơ</h3>
                <button class="btn-close-modal" onclick="UserProfile.closeEditModal()">×</button>
            </div>
            <div class="modal-body">
                <!-- Cover Preview -->
                <div class="edit-modal-cover-preview" id="modal-cover-preview">
                    <button class="btn-modal-action" onclick="document.getElementById('cover-input').click()"><i class="fas fa-camera"></i> Thay đổi ảnh bìa</button>
                    <button class="btn-modal-action" onclick="UserProfile.openPhotoPicker(true)"><i class="fas fa-images"></i> Chọn từ ảnh cũ</button>
                </div>
                
                <!-- Avatar Preview -->
                <div class="edit-modal-avatar-section">
                    <div class="edit-modal-avatar-wrapper">
                        <img src="assets/default-avatar.svg" id="modal-avatar-preview">
                        <button class="btn-change-avatar-modal" onclick="document.getElementById('avatar-input').click()"><i class="fas fa-camera"></i></button>
                    </div>
                </div>

                <!-- Fields -->
                <div class="edit-modal-fields">
                    <div class="input-group">
                        <label>Tên hiển thị</label>
                        <input type="text" id="modal-edit-name" placeholder="Tên của bạn">
                    </div>
                    <div class="input-group">
                        <label>Tiểu sử</label>
                        <textarea id="modal-edit-bio" placeholder="Mô tả về bản thân bạn..."></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn--ghost" onclick="UserProfile.closeEditModal()">Hủy</button>
                <button class="btn btn--primary" id="btn-save-modal" onclick="UserProfile.saveProfileFromModal()">💾 Lưu thay đổi</button>
            </div>
        </div>
    </div>

    <input type="file" id="avatar-input" hidden accept="image/*">
    <input type="file" id="cover-input" hidden accept="image/*">

    <script src="SharedUI.js"></script>
    <script src="profile.js"></script>
</body>
</html>
