<!DOCTYPE html>
<html lang="vi" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WanderViệt — Bảng Xếp Hạng Nhà Thám Hiểm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="global-tokens.css?v=2" />
  <link rel="stylesheet" href="styles.css?v=2" />
  <style>
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      padding-top: var(--header-h);
      background-image: 
        radial-gradient(circle at 5% 5%, rgba(0, 240, 255, 0.02) 0%, transparent 30%),
        radial-gradient(circle at 95% 95%, rgba(244, 63, 94, 0.02) 0%, transparent 30%);
      background-attachment: fixed;
    }

    /* --- Compact Hero --- */
    .lb-hero {
      position: relative;
      padding: 2.5rem 0 2rem;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .lb-hero h1 {
      font-family: var(--font-display);
      font-size: 2.25rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    .lb-hero p {
      font-size: 1rem;
      color: var(--text-muted);
      max-width: 500px;
      margin: 0 auto;
      opacity: 0.8;
    }

    /* --- Layout --- */
    .lb-main { padding: 2rem 0 5rem; }
    .lb-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 2rem;
      align-items: start;
    }

    @media (max-width: 1024px) {
      .lb-layout { grid-template-columns: 1fr; }
    }

    /* --- Modular Sectioning --- */
    .lb-section-box {
      background: rgba(15, 23, 42, 0.3);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      overflow: hidden;
      margin-bottom: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    /* --- Podium Compact --- */
    .lb-podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 1.5rem;
      padding: 4rem 1rem 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.03), transparent);
      min-height: 320px;
    }

    .podium-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 140px;
      position: relative;
    }

    .podium-avatar-wrap {
      position: relative;
      z-index: 2;
      margin-bottom: -15px;
    }

    .podium-avatar {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      border: 3px solid rgba(255,255,255,0.1);
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
      background: var(--bg-elevated);
      overflow: hidden;
      transition: all 0.3s;
    }

    .rank-1 .podium-avatar { width: 100px; height: 100px; border-color: #fbbf24; border-radius: 32px; }
    .rank-2 .podium-avatar { width: 85px; height: 85px; border-color: #94a3b8; border-radius: 28px; }
    .rank-3 .podium-avatar { width: 75px; height: 75px; border-color: #b45309; border-radius: 24px; }

    .podium-crown {
      position: absolute;
      top: -35px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.5rem;
      z-index: 3;
      filter: drop-shadow(0 4px 10px rgba(251, 191, 36, 0.6));
    }

    .podium-base {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 20px 20px 0 0;
      padding: 2.5rem 0.75rem 1.5rem;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
      border-bottom: none;
    }

    .rank-1 .podium-base { height: 180px; background: linear-gradient(to bottom, rgba(251, 191, 36, 0.12), transparent); border-color: rgba(251, 191, 36, 0.25); }
    .rank-2 .podium-base { height: 130px; }
    .rank-3 .podium-base { height: 100px; }

    .podium-name-top {
      font-size: 1rem;
      font-weight: 850;
      margin-bottom: 0.75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #fff;
      max-width: 130px;
    }

    .podium-xp { font-size: 1.25rem; font-weight: 900; color: var(--primary); }
    .rank-1 .podium-xp { color: #fbbf24; font-size: 1.5rem; }

    /* --- List Items High Density --- */
    .lb-card { padding: 1.5rem; }
    
    .lb-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .lb-tabs {
      background: rgba(255,255,255,0.04);
      padding: 0.4rem;
      border-radius: 16px;
      display: flex;
      gap: 0.4rem;
    }

    .lb-tab {
      padding: 0.6rem 1.5rem;
      font-size: 0.9rem;
      border-radius: 12px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .lb-tab.active { background: #fff; color: #000; box-shadow: 0 4px 12px rgba(255,255,255,0.1); }

    .lb-search input {
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      font-size: 0.95rem;
      width: 240px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      outline: none;
      transition: all 0.3s;
    }
    .lb-search input:focus { border-color: var(--primary); background: rgba(255,255,255,0.06); width: 280px; }
    .lb-search { position: relative; }
    .lb-search::before { content: '🔍'; position: absolute; left: 1.1rem; top: 50%; transform: translateY(-50%); font-size: 1rem; opacity: 0.5; }

    .lb-list { display: flex; flex-direction: column; gap: 0.75rem; }
    
    .lb-item {
      display: flex !important;
      align-items: center !important;
      justify-content: flex-start !important;
      padding: 0.85rem 1.5rem;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 20px;
      gap: 1.5rem;
      transition: all 0.4s var(--ease);
    }

    .lb-item:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); transform: translateX(5px); }

    .lb-rank-badge {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.1rem;
      border-radius: 14px;
      color: #fff;
      flex-shrink: 0;
    }

    .lb-avatar { width: 52px; height: 52px; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; background: var(--bg-elevated); }
    .lb-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .lb-info { flex: 1; display: flex; flex-direction: column; gap: 0.25rem; min-width: 0; }
    .lb-name { font-size: 1.1rem; font-weight: 800; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .lb-xp { text-align: right; flex-shrink: 0; }
    .lb-xp-val { font-size: 1.35rem; font-weight: 900; color: #fff; display: block; line-height: 1; margin-bottom: 2px; }
    .lb-xp-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 800; letter-spacing: 0.05em; }

    /* --- Sidebar Optimized --- */
    .lb-side-card {
      background: rgba(15, 23, 42, 0.3);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 1.75rem;
      border-radius: 28px;
      margin-bottom: 1.5rem;
    }

    .side-card-title {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      font-weight: 900;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .side-card-title::before { content: '✨'; font-size: 1rem; }

    .my-stats-content {
      background: rgba(255,255,255,0.03);
      padding: 2.5rem 1rem;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .sidebar-rank-item {
      display: flex;
      align-items: center;
      padding: 0.85rem 1.25rem;
      background: rgba(255,255,255,0.03);
      border-radius: 18px;
      gap: 1.25rem;
      margin-bottom: 0.85rem;
      border: 1px solid transparent;
      transition: all 0.3s;
    }
    .sidebar-rank-item:hover { border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); transform: translateX(5px); }

    .sidebar-rank-name { font-size: 1rem; font-weight: 750; color: #fff; }
    .sidebar-rank-xp { font-size: 0.85rem; color: var(--text-muted); font-weight: 700; }

    /* Rank Specific Accents */
    :root {
      --lb-bronze-text: #fcd34d;
      --lb-silver-text: #e2e8f0;
      --lb-gold-text: #fbbf24;
      --lb-plat-text: #2dd4bf;
      --lb-diam-text: #3b82f6;
      --lb-leg-text: #a855f7;
    }

    .tier-bronze { background: linear-gradient(135deg, rgba(146, 64, 14, 0.1), transparent); }
    .tier-silver { background: linear-gradient(135deg, rgba(71, 85, 105, 0.1), transparent); }
    .tier-gold { background: linear-gradient(135deg, rgba(161, 98, 7, 0.15), transparent); }
    .tier-platinum { background: linear-gradient(135deg, rgba(15, 118, 110, 0.15), transparent); }
    .tier-diamond { background: linear-gradient(135deg, rgba(29, 78, 216, 0.15), transparent); }
    .tier-legendary { background: linear-gradient(135deg, rgba(107, 33, 168, 0.2), transparent); }

    .tier-platinum:hover {
      box-shadow: 0 12px 48px rgba(45, 212, 191, 0.25) !important;
    }

    .tier-platinum .rank-tier-icon {
      filter: drop-shadow(0 0 20px rgba(45, 212, 191, 0.5));
    }

    .tier-platinum .rank-level-row {
      background: rgba(45, 212, 191, 0.05);
      border: 1px solid rgba(45, 212, 191, 0.1);
      color: var(--lb-plat-text);
    }

    .tier-platinum .rank-xp-tag {
      color: var(--lb-plat-xp);
    }

    /* Diamond */
    .tier-diamond {
      background: linear-gradient(180deg, rgba(59, 130, 246, 0.08) 0%, var(--bg-card) 100%);
      box-shadow: 0 4px 24px rgba(59, 130, 246, 0.12);
    }

    .tier-diamond:hover {
      box-shadow: 0 12px 48px rgba(59, 130, 246, 0.25) !important;
    }

    .tier-diamond .rank-tier-icon {
      filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.5));
    }

    .tier-diamond .rank-level-row {
      background: rgba(59, 130, 246, 0.05);
      border: 1px solid rgba(59, 130, 246, 0.1);
      color: var(--lb-diam-text);
    }

    .tier-diamond .rank-xp-tag {
      color: var(--lb-diam-xp);
    }

    /* Legendary */
    .tier-legendary {
      background: linear-gradient(180deg, rgba(168, 85, 247, 0.12) 0%, var(--bg-card) 100%);
      box-shadow: 0 4px 24px rgba(168, 85, 247, 0.18);
    }

    .tier-legendary:hover {
      box-shadow: 0 12px 48px rgba(168, 85, 247, 0.35) !important;
    }

    .tier-legendary .rank-tier-icon {
      filter: drop-shadow(0 0 25px rgba(168, 85, 247, 0.7));
    }

    .tier-legendary .rank-level-row {
      background: rgba(168, 85, 247, 0.08);
      border: 1px solid rgba(168, 85, 247, 0.15);
      color: var(--lb-leg-text);
    }

    .tier-legendary .rank-xp-tag {
      color: var(--lb-leg-xp);
    }
  </style>
</head>

<body>
  <header class="site-header" id="header-container"></header>

  <section class="lb-hero">
    <div class="container lb-hero__content">
      <h1>Bảng Xếp Hạng</h1>
      <p>Nơi vinh danh những nhà thám hiểm kiệt xuất của WanderViệt.</p>
    </div>
  </section>

  <main class="lb-main">
    <div class="container lb-layout">
      <!-- Left Column: Main Leaderboard -->
      <div class="lb-left">
        <!-- Podium Section -->
        <div class="lb-section-box">
          <div id="lbPodium" class="lb-podium" style="display: none;"></div>
        </div>
        
        <!-- List Section -->
        <div class="lb-section-box">
          <div class="lb-card">
            <!-- Card Header -->
            <div class="lb-card-header">
              <div class="lb-tabs">
                <button class="lb-tab active">Mùa giải</button>
                <button class="lb-tab">Tất cả</button>
                <button class="lb-tab">Bạn bè</button>
              </div>
              <div class="lb-search">
                <input type="text" id="lbSearchInput" placeholder="Tìm tên..." />
              </div>
            </div>

            <div id="leaderboardList" class="lb-list">
              <div class="loading-wrap">
                <div class="loading-spinner"></div>
                <p>Đang tải dữ liệu...</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Column: Dashboard Sidebar -->
      <div class="lb-right">
        <!-- User Stats Card -->
        <div class="lb-side-card my-stats-card">
          <h3 class="side-card-title">Thống kê của bạn</h3>
          <div id="myStatsContent" class="my-stats-content">
            <p style="color: var(--text-muted); font-size: 0.9rem;">Đang tải dữ liệu cá nhân...</p>
          </div>
        </div>

        <!-- Rank System Mini List -->
        <div class="lb-side-card rank-info-card">
          <h3 class="side-card-title">Hệ thống Cấp bậc</h3>
          <div id="ranksSidebar" class="ranks-sidebar-list">
            <!-- Dynamically filled by JS -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="SharedUI.js?v=1777335000000"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const list = document.getElementById('leaderboardList');
      const podium = document.getElementById('lbPodium');
      const ranksSidebar = document.getElementById('ranksSidebar');

      // --- Render Rank Tiers Grid ---
      const rankTiersData = [
        { name: 'Đồng', class: 'tier-bronze', levels: [{ t: 'I', x: 0 }] },
        { name: 'Bạc', class: 'tier-silver', levels: [{ t: 'I', x: 300 }] },
        { name: 'Vàng', class: 'tier-gold', levels: [{ t: 'I', x: 1000 }] },
        { name: 'Bạch Kim', class: 'tier-platinum', levels: [{ t: 'I', x: 2000 }] },
        { name: 'Kim Cương', class: 'tier-diamond', levels: [{ t: 'I', x: 3200 }] },
        { name: 'Huyền Thoại', class: 'tier-legendary', levels: [{ t: 'Vô Song', x: 5000 }] }
      ];

      if (ranksSidebar) {
        ranksSidebar.innerHTML = rankTiersData.map(tier => `
          <div class="sidebar-rank-item ${tier.class}">
            <div style="display:flex; align-items:center; transform: scale(0.7); margin: -10px -15px;">
              ${WanderUI.getRankBadgeHTML(tier.name, tier.name === 'Huyền Thoại' ? '' : 'I')}
            </div>
            <div class="sidebar-rank-info">
              <div class="sidebar-rank-name">${tier.name}</div>
              <div class="sidebar-rank-xp">Từ ${tier.levels[0].x.toLocaleString()} XP</div>
            </div>
          </div>
        `).join('');
      }

      const showLoginPrompt = () => {
        if (!myStatsContent) return;
        myStatsContent.innerHTML = `
          <div style="padding: 1rem 0; color: var(--text-muted);">
            <div style="font-size: 2.5rem; margin-bottom: 1rem; filter: grayscale(1); opacity: 0.5;">👤</div>
            <p style="margin-bottom: 1.5rem; font-size: 0.95rem;">Đăng nhập để xem vị trí của bạn</p>
            <button class="btn btn--primary" style="width: 100%" data-auth-open>Tham gia ngay</button>
          </div>
        `;
      };

      let allUsers = [];
      const myStatsContent = document.getElementById('myStatsContent');
      const token = localStorage.getItem('wander_token');
      if (token && myStatsContent) {
        fetch('/api/auth/user/me', { headers: { 'x-auth-token': token } })
          .then(res => res.json())
          .then(data => {
            if (data.success && data.user) {
              const user = data.user;
              myStatsContent.innerHTML = `
                <div style="width: 80px; height: 80px; border-radius: 24px; overflow: hidden; border: 3px solid var(--primary); margin-bottom: 1rem; background: var(--bg-elevated); box-shadow: 0 10px 25px rgba(0,240,255,0.2);">
                  ${user.avatar ? `<img src="${user.avatar}" style="width:100%;height:100%;object-fit:cover;">` : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;">👤</div>`}
                </div>
                <h4 style="font-size: 1.25rem; font-weight: 850; color: #fff; margin-bottom: 0.25rem;">${user.displayName || user.name || 'Người dùng'}</h4>
                <div style="display:flex; align-items:center; gap:0.5rem; justify-content:center; margin-bottom: 1rem; opacity: 0.8;">
                  <div style="transform: scale(0.7); margin: -15px -20px;">
                    ${WanderUI.getRankBadgeHTML(user.rank || 'Đồng', user.rankTier || 'I')}
                  </div>
                </div>
                <div style="font-size: 2rem; font-weight: 900; color: #fff; letter-spacing: -0.05em;">${(user.points || 0).toLocaleString()} <span style="font-size:0.9rem; color:var(--text-muted); font-weight: 700;">XP</span></div>
              `;
            } else {
              localStorage.removeItem('wander_token');
              showLoginPrompt();
            }
          }).catch(e => showLoginPrompt());
      } else if (myStatsContent) {
        showLoginPrompt();
      }

      // --- Render Leaderboard ---
      fetch('/api/auth/leaderboard')
        .then(res => res.json())
        .then(json => {
          if (!json.success || !json.leaderboard.length) {
            list.innerHTML = '<div class="loading-wrap"><p>Chưa có dữ liệu bảng xếp hạng</p></div>';
            return;
          }
          allUsers = json.leaderboard;
          renderLeaderboard(allUsers);
        })
        .catch(err => {
          list.innerHTML = '<div class="loading-wrap"><p style="color:var(--danger);">❌ Lỗi kết nối máy chủ</p></div>';
        });

      function renderLeaderboard(users) {
        if (!users.length) {
          list.innerHTML = '<div class="loading-wrap"><p>Không tìm thấy nhà thám hiểm nào</p></div>';
          podium.style.display = 'none';
          return;
        }

        list.innerHTML = '';

        // Render Podium (Top 3)
        if (users.length > 0) {
          podium.style.display = 'flex';
          const renderPodiumItem = (u, rank) => {
            if (!u) return '';
            const r = u.rank || 'Đồng';
            const isFirst = rank === 1;
            const crownHtml = isFirst ? '<div class="podium-crown">👑</div>' : '';
            return `
              <div class="podium-item rank-${rank}">
                <div class="podium-avatar-wrap">
                  ${crownHtml}
                  <div class="podium-avatar">
                    ${u.avatar ? `<img src="${u.avatar}" alt="Avatar">` : `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:${isFirst ? '2rem' : '1.5rem'}; background: var(--bg-elevated);">👤</div>`}
                  </div>
                </div>
                <div class="podium-base">
                  <div class="podium-name-top" title="${u.displayName || u.name}">${u.displayName || u.name}</div>
                  <div style="display:flex; align-items:center; justify-content:center; gap:0.25rem; transform: scale(0.85); margin-bottom: 0.5rem;">
                    ${WanderUI.getRankBadgeHTML(r, u.rankTier)}
                  </div>
                  <span class="podium-xp">${u.points.toLocaleString()} <small style="font-size:0.65rem; opacity:0.6; font-weight:700;">XP</small></span>
                </div>
              </div>
            `;
          };

          let podiumHtml = '';
          if (users[1]) podiumHtml += renderPodiumItem(users[1], 2);
          if (users[0]) podiumHtml += renderPodiumItem(users[0], 1);
          if (users[2]) podiumHtml += renderPodiumItem(users[2], 3);
          podium.innerHTML = podiumHtml;
        }

        // Render Rank 4+
        const listUsers = users.slice(3);
        if (listUsers.length > 0) {
          listUsers.forEach((u, idx) => {
            const rankNum = users.indexOf(u) + 1;
            const r = u.rank || 'Đồng';
            const item = document.createElement('div');
            item.className = 'lb-item';
            item.style.animationDelay = `${idx * 0.05}s`;
            item.innerHTML = `
              <div class="lb-rank-badge">${rankNum}</div>
              <div class="lb-avatar">
                ${u.avatar ? `<img src="${u.avatar}" alt="Avatar">` : `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:1.5rem;">👤</div>`}
              </div>
              <div class="lb-info">
                <span class="lb-name">${u.displayName || u.name}</span>
                <div class="lb-tier" style="display:flex; align-items:center; gap:0.25rem; opacity: 0.8; transform: scale(0.85); transform-origin: left center;">
                  ${WanderUI.getRankBadgeHTML(r, u.rankTier)}
                </div>
              </div>
              <div class="lb-xp">
                <span class="lb-xp-val">${u.points.toLocaleString()}</span>
                <span class="lb-xp-label">XP</span>
              </div>
            `;
            list.appendChild(item);
          });
        } else if (users.length <= 3) {
          list.innerHTML = '<div style="text-align:center; padding: 4rem 2rem; opacity: 0.5;">Chưa có thêm nhà thám hiểm nào trong danh sách.</div>';
        }
      }

      // --- Search Implementation ---
      const searchInput = document.getElementById('lbSearchInput');
      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          const q = e.target.value.toLowerCase().trim();
          if (!q) {
            renderLeaderboard(allUsers);
            return;
          }
          const filtered = allUsers.filter(u =>
            (u.displayName || u.name || '').toLowerCase().includes(q)
          );
          renderLeaderboard(filtered);
        });
      }

      // --- Tabs Implementation ---
      const tabs = document.querySelectorAll('.lb-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');

          const text = tab.textContent.trim();
          if (text === 'Mùa giải này') {
            renderLeaderboard(allUsers);
          } else if (text === 'Mọi thời đại') {
            renderLeaderboard(allUsers);
            WanderUI.showToast("Đang hiển thị bảng xếp hạng tổng quát", "info");
          } else if (text === 'Bạn bè') {
            const token = localStorage.getItem('wander_token');
            if (!token) {
              WanderUI.showToast("Vui lòng đăng nhập để xem bạn bè", "warning");
              return;
            }
            list.innerHTML = '<div class="loading-wrap"><p>Bạn chưa kết nối với nhà thám hiểm nào</p></div>';
            podium.style.display = 'none';
          }
        });
      });
    });

    // Track quest activity: Xem bảng xếp hạng
    try {
      var qa = JSON.parse(localStorage.getItem('wv_quest_activity') || '{}');
      qa.socLeaderboard = 1;
      localStorage.setItem('wv_quest_activity', JSON.stringify(qa));
    } catch (e) { }
  </script>

  <script src="chat-brain.js"></script>
  <script src="main.js?v=1777307000000" defer></script>
