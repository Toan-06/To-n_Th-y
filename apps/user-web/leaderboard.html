<!DOCTYPE html>
<html lang="vi" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WanderViệt — Bảng Xếp Hạng Nhà Thám Hiểm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="global-tokens.css?v=2" />
  <link rel="stylesheet" href="styles.css?v=2" />
  <style>
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      padding-top: var(--header-h);
      background-image:
        radial-gradient(circle at 5% 5%, rgba(0, 240, 255, 0.02) 0%, transparent 30%),
        radial-gradient(circle at 95% 95%, rgba(244, 63, 94, 0.02) 0%, transparent 30%);
      background-attachment: fixed;
    }

    /* --- Premium Hero --- */
    .lb-hero {
      position: relative;
      padding: 3rem 0 2.5rem;
      text-align: center;
      overflow: hidden;
    }

    .lb-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 80% at 50% -20%, rgba(251, 191, 36, 0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 20% 50%, rgba(0, 240, 255, 0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .lb-hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(251, 191, 36, 0.3), rgba(0, 240, 255, 0.3), transparent);
    }

    .lb-hero h1 {
      font-family: var(--font-display);
      font-size: 2.75rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      margin-bottom: 0.6rem;
      background: linear-gradient(135deg, #fff 30%, #fbbf24 60%, #fff 90%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmerText 4s linear infinite;
      position: relative;
    }

    @keyframes shimmerText {
      0% {
        background-position: 0% center;
      }

      100% {
        background-position: 200% center;
      }
    }

    .lb-hero p {
      font-size: 1rem;
      color: var(--text-muted);
      max-width: 460px;
      margin: 0 auto;
      opacity: 0.7;
      letter-spacing: 0.01em;
    }

    /* --- Layout --- */
    .lb-main {
      padding: 2rem 0 5rem;
    }

    .lb-layout {
      display: grid;
      grid-template-columns: 280px 280px 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    .lb-mobile-top-row {
      display: contents;
    }

    .container {
      width: min(1200px, 100% - 2rem);
    }

    @media (max-width: 1200px) {
      .lb-layout {
        grid-template-columns: 240px 240px 1fr;
        gap: 1.25rem;
      }
    }

    @media (max-width: 1000px) {
      .lb-layout {
        grid-template-columns: 240px 1fr;
        gap: 1.25rem;
      }

      /* Stack both sidebar cards vertically in left column */
      .lb-mobile-top-row {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .rank-info-card {
        display: block !important;
      }
    }

    @media (max-width: 768px) {
      .lb-layout {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .lb-mobile-top-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        align-items: stretch;
        width: 100%;
      }

      .lb-mobile-top-row .lb-side-card {
        margin-bottom: 0;
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .lb-mobile-top-row .lb-side-card .my-stats-content,
      .lb-mobile-top-row .lb-side-card .ranks-sidebar-list {
        flex: 1;
      }
    }

    @media (max-width: 480px) {
      .lb-mobile-top-row {
        grid-template-columns: 1fr;
      }
    }

    /* --- Section Box (right column) --- */
    .lb-section-box {
      background: var(--bg-elevated);
      backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    /* --- Item Entrance Animation --- */
    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .lb-item {
      animation: fadeSlideIn 0.35s ease both;
    }

    /* --- Loading State --- */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      gap: 1rem;
      opacity: 0.5;
    }

    .loading-wrap .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: rgba(251, 191, 36, 0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* --- Podium Compact --- */
    .lb-podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 1.5rem;
      padding: 4rem 1rem 0;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.03), transparent);
      min-height: 320px;
    }

    .podium-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 140px;
      position: relative;
    }

    .podium-avatar-wrap {
      position: relative;
      z-index: 2;
      margin-bottom: -15px;
    }

    .podium-avatar {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
      background: var(--bg-elevated);
      overflow: hidden;
      transition: all 0.3s;
    }

    .rank-1 .podium-avatar {
      width: 100px;
      height: 100px;
      border-color: #fbbf24;
      border-radius: 32px;
    }

    .rank-2 .podium-avatar {
      width: 85px;
      height: 85px;
      border-color: #94a3b8;
      border-radius: 28px;
    }

    .rank-3 .podium-avatar {
      width: 75px;
      height: 75px;
      border-color: #b45309;
      border-radius: 24px;
    }

    .podium-crown {
      position: absolute;
      top: -35px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.5rem;
      z-index: 3;
      filter: drop-shadow(0 4px 10px rgba(251, 191, 36, 0.6));
    }

    .podium-base {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 20px 20px 0 0;
      padding: 2.5rem 0.75rem 1.5rem;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-bottom: none;
    }

    .rank-1 .podium-base {
      height: 180px;
      background: linear-gradient(to bottom, rgba(251, 191, 36, 0.12), transparent);
      border-color: rgba(251, 191, 36, 0.25);
    }

    .rank-2 .podium-base {
      height: 130px;
    }

    .rank-3 .podium-base {
      height: 100px;
    }

    .podium-name-top {
      font-size: 1rem;
      font-weight: 850;
      margin-bottom: 0.75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #fff;
      max-width: 130px;
    }

    .podium-xp {
      font-size: 1.25rem;
      font-weight: 900;
      color: var(--primary);
    }

    .rank-1 .podium-xp {
      color: #fbbf24;
      font-size: 1.5rem;
    }

    /* --- List Card --- */
    .lb-card {
      padding: 1.25rem;
    }

    .lb-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      gap: 1rem;
      flex-wrap: wrap;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    /* --- Premium Tabs --- */
    .lb-tabs {
      background: rgba(255, 255, 255, 0.03);
      padding: 0.35rem;
      border-radius: 14px;
      display: flex;
      gap: 0.3rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .lb-tab {
      padding: 0.55rem 1.35rem;
      font-size: 0.85rem;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      letter-spacing: 0.01em;
    }

    .lb-tab:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    .lb-tab.active {
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(0, 240, 255, 0.1));
      color: #fff;
      border: 1px solid rgba(251, 191, 36, 0.3);
      box-shadow: 0 2px 12px rgba(251, 191, 36, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }
    
    .lb-refresh-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      outline: none;
    }
    
    .lb-refresh-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-color: rgba(251, 191, 36, 0.3);
    }
    
    .lb-refresh-btn.spinning {
      animation: spin 1s linear infinite;
      color: #fbbf24;
      pointer-events: none;
    }

    .lb-search input {
      padding: 0.65rem 1rem 0.65rem 2.5rem;
      font-size: 0.9rem;
      width: 200px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #fff;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .lb-search input:focus {
      border-color: rgba(251, 191, 36, 0.4);
      background: rgba(255, 255, 255, 0.06);
      width: 240px;
      box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.08);
    }

    .lb-search input::placeholder {
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.85rem;
    }

    .lb-search {
      position: relative;
    }

    .lb-search::before {
      content: '🔍';
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
      opacity: 0.4;
      pointer-events: none;
    }

    .lb-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .lb-item {
      display: grid !important;
      grid-template-columns: 40px 50px 1fr 52px 70px;
      align-items: center;
      padding: 0.85rem 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      gap: 0.85rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: visible;
      cursor: pointer;
    }


    .lb-item.rank-1 {
      padding-top: 1.2rem;
    }


    .lb-rank-badge {
      width: 36px;
      height: 36px;
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1rem;
      border-radius: 12px;
      color: var(--text);
      flex-shrink: 0;
    }

    .lb-avatar {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1.5px solid var(--border);
      background: var(--bg-elevated);
    }

    .lb-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* --- Premium Gaming Avatar Frames (Lien Quan Style) --- */
    .lb-avatar-frame {
      position: relative;
      flex-shrink: 0;
      width: 50px;
      height: 50px;
      box-sizing: border-box;
      padding: 3px;
    }

    .lb-avatar-frame .lb-avatar {
      border: none;
      border-radius: 0;
      z-index: 2;
      position: relative;
      /* Octagonal inner cut */
      clip-path: polygon(15% 0, 85% 0, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0 85%, 0 15%);
    }

    /* Common metallic animation */
    @keyframes metallicShine {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* GOLD FRAME */
    .lb-avatar-frame.frame-gold::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      clip-path: polygon(15% 0, 85% 0, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0 85%, 0 15%);
      background: linear-gradient(135deg, #fcd34d 0%, #b45309 25%, #fffbeb 50%, #d97706 75%, #fcd34d 100%);
      background-size: 200% 200%;
      animation: metallicShine 3s ease infinite;
    }

    .lb-avatar-frame.frame-gold::after {
      content: '';
      position: absolute;
      inset: -4px;
      z-index: -1;
      background: rgba(251, 191, 36, 0.5);
      filter: blur(8px);
      clip-path: polygon(15% 0, 85% 0, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0 85%, 0 15%);
      animation: goldPulse 2s ease-in-out infinite;
    }

    @keyframes goldPulse {

      0%,
      100% {
        opacity: 0.5;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.05);
      }
    }

    /* SILVER FRAME */
    .lb-avatar-frame.frame-silver::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      clip-path: polygon(15% 0, 85% 0, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0 85%, 0 15%);
      background: linear-gradient(135deg, #e2e8f0 0%, #64748b 25%, #ffffff 50%, #94a3b8 75%, #e2e8f0 100%);
      background-size: 200% 200%;
      animation: metallicShine 3.5s ease infinite;
    }

    .lb-avatar-frame.frame-silver::after {
      content: '';
      position: absolute;
      inset: -3px;
      z-index: -1;
      background: rgba(148, 163, 184, 0.4);
      filter: blur(6px);
      clip-path: polygon(15% 0, 85% 0, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0 85%, 0 15%);
    }

    /* BRONZE FRAME */
    .lb-avatar-frame.frame-bronze::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      clip-path: polygon(15% 0, 85% 0, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0 85%, 0 15%);
      background: linear-gradient(135deg, #f59e0b 0%, #92400e 25%, #fde68a 50%, #b45309 75%, #f59e0b 100%);
      background-size: 200% 200%;
      animation: metallicShine 4s ease infinite;
    }

    .lb-avatar-frame.frame-bronze::after {
      content: '';
      position: absolute;
      inset: -3px;
      z-index: -1;
      background: rgba(180, 83, 9, 0.4);
      filter: blur(6px);
      clip-path: polygon(15% 0, 85% 0, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0 85%, 0 15%);
    }

    /* No frame (rank 4+) */
    .lb-avatar-plain {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      overflow: hidden;
      border: 1.5px solid var(--border);
      background: var(--bg-elevated);
      flex-shrink: 0;
    }

    .lb-avatar-plain img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Crown */
    .lb-avatar-crown {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1rem;
      z-index: 5;
      filter: drop-shadow(0 2px 6px rgba(251, 191, 36, 0.9));
      animation: floatCrown 2.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes floatCrown {

      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(-3px);
      }
    }

    .lb-info {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .lb-name {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }

    /* Fixed-width column for rank badge icon — clipped */
    .lb-tier-col {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .lb-xp {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      width: 64px;
    }

    .lb-xp-chip {
      display: inline-flex;
      align-items: baseline;
      gap: 3px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 0.3rem 0.55rem;
      white-space: nowrap;
    }

    .lb-xp-val {
      font-size: 1rem;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.03em;
    }

    .lb-xp-label {
      font-size: 0.6rem;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.06em;
      line-height: 1.6;
    }

    /* XP chip per rank */
    .lb-item.rank-1 .lb-xp-chip {
      background: rgba(251, 191, 36, 0.12);
      border-color: rgba(251, 191, 36, 0.3);
    }

    .lb-item.rank-1 .lb-xp-val {
      color: #fbbf24;
    }

    .lb-item.rank-1 .lb-xp-label {
      color: rgba(251, 191, 36, 0.7);
    }

    .lb-item.rank-2 .lb-xp-chip {
      background: rgba(148, 163, 184, 0.08);
      border-color: rgba(148, 163, 184, 0.2);
    }

    .lb-item.rank-2 .lb-xp-val {
      color: #94a3b8;
    }

    .lb-item.rank-3 .lb-xp-chip {
      background: rgba(217, 119, 6, 0.1);
      border-color: rgba(217, 119, 6, 0.25);
    }

    .lb-item.rank-3 .lb-xp-val {
      color: #d97706;
    }

    .lb-item.rank-3 .lb-xp-label {
      color: rgba(217, 119, 6, 0.7);
    }

    /* Light mode chip */
    [data-theme="light"] .lb-xp-chip {
      background: rgba(0, 0, 0, 0.04);
      border-color: rgba(0, 0, 0, 0.1);
    }

    [data-theme="light"] .lb-item.rank-1 .lb-xp-chip {
      background: rgba(217, 119, 6, 0.08);
      border-color: rgba(217, 119, 6, 0.25);
    }

    [data-theme="light"] .lb-item.rank-1 .lb-xp-val {
      color: #b45309;
    }

    [data-theme="light"] .lb-item.rank-3 .lb-xp-val {
      color: #b45309;
    }

    /* Special Rank Styling in List */
    .lb-item.rank-1 {
      background: linear-gradient(90deg, rgba(251, 191, 36, 0.12), rgba(251, 191, 36, 0.03));
      border-color: rgba(251, 191, 36, 0.35);
      box-shadow: 0 4px 24px rgba(251, 191, 36, 0.08), inset 0 1px 0 rgba(251, 191, 36, 0.1);
    }

    .lb-item.rank-1::before {
      background: #fbbf24 !important;
      box-shadow: 0 0 12px rgba(251, 191, 36, 0.6);
    }

    .lb-item.rank-2 {
      background: linear-gradient(90deg, rgba(148, 163, 184, 0.1), rgba(148, 163, 184, 0.02));
      border-color: rgba(148, 163, 184, 0.3);
    }

    .lb-item.rank-2::before {
      background: #94a3b8 !important;
    }

    .lb-item.rank-3 {
      background: linear-gradient(90deg, rgba(180, 83, 9, 0.1), rgba(180, 83, 9, 0.02));
      border-color: rgba(217, 119, 6, 0.35);
    }

    .lb-item.rank-3::before {
      background: #d97706 !important;
    }

    .lb-item.rank-1 .lb-rank-badge {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #000;
      box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
      font-size: 1.1rem;
    }

    .lb-item.rank-2 .lb-rank-badge {
      background: linear-gradient(135deg, #94a3b8, #64748b);
      color: #000;
    }

    .lb-item.rank-3 .lb-rank-badge {
      background: linear-gradient(135deg, #d97706, #b45309);
      color: #fff;
    }

    .lb-item.rank-1 .lb-name {
      color: #b45309;
      font-size: 1.05rem;
    }

    .lb-item.rank-2 .lb-name {
      color: var(--text);
    }

    /* uses var so it adapts to both modes */
    .lb-item.rank-1 .lb-avatar {
      border-color: rgba(251, 191, 36, 0.6);
      box-shadow: 0 0 16px rgba(251, 191, 36, 0.25);
    }

    .lb-item.rank-2 .lb-avatar {
      border-color: rgba(148, 163, 184, 0.5);
    }

    .lb-item.rank-3 .lb-avatar {
      border-color: rgba(217, 119, 6, 0.5);
    }

    /* Dark mode overrides for rank-specific name colors */
    [data-theme="dark"] .lb-item.rank-1 .lb-name {
      color: #fbbf24;
    }

    [data-theme="dark"] .lb-item.rank-1 .lb-xp-val {
      color: #fbbf24;
    }

    [data-theme="dark"] .lb-item.rank-2 .lb-xp-val {
      color: #94a3b8;
    }

    [data-theme="dark"] .lb-item.rank-3 .lb-xp-val {
      color: #d97706;
    }

    /* --- Sidebar Cards --- */
    .lb-side-card {
      background: var(--bg-elevated);
      backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--border);
      padding: 1.5rem;
      border-radius: 24px;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .lb-side-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow), 0 0 0 1px var(--accent);
      opacity: 0.9;
    }

    .side-card-title {
      font-size: 1.05rem;
      margin-bottom: 1.25rem;
      font-weight: 800;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      letter-spacing: -0.02em;
    }

    .side-card-title::before {
      content: '✦';
      font-size: 0.8rem;
      color: #fbbf24;
      opacity: 0.8;
    }

    .my-stats-content {
      background: var(--bg-card);
      padding: 2rem 1rem;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border: 1px solid var(--border);
    }

    .sidebar-rank-item {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--bg-card);
      border-radius: 14px;
      gap: 1rem;
      margin-bottom: 0.65rem;
      border: 1px solid transparent;
      transition: all 0.25s;
      cursor: default;
    }

    .sidebar-rank-item:hover {
      border-color: var(--border);
      background: var(--bg-elevated);
      transform: translateX(4px);
    }

    .sidebar-rank-name {
      font-size: 0.9rem;
      font-weight: 750;
      color: var(--text);
    }

    .sidebar-rank-xp {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-top: 1px;
    }

    /* Rank Specific Accents */
    :root {
      --lb-bronze-text: #fcd34d;
      --lb-silver-text: #e2e8f0;
      --lb-gold-text: #fbbf24;
      --lb-plat-text: #2dd4bf;
      --lb-diam-text: #3b82f6;
      --lb-leg-text: #a855f7;
    }

    .tier-bronze {
      background: linear-gradient(135deg, rgba(146, 64, 14, 0.1), transparent);
    }

    .tier-silver {
      background: linear-gradient(135deg, rgba(71, 85, 105, 0.1), transparent);
    }

    .tier-gold {
      background: linear-gradient(135deg, rgba(161, 98, 7, 0.15), transparent);
    }

    .tier-platinum {
      background: linear-gradient(135deg, rgba(15, 118, 110, 0.15), transparent);
    }

    .tier-diamond {
      background: linear-gradient(135deg, rgba(29, 78, 216, 0.15), transparent);
    }

    .tier-legendary {
      background: linear-gradient(135deg, rgba(107, 33, 168, 0.2), transparent);
    }

    .tier-platinum:hover {
      box-shadow: 0 12px 48px rgba(45, 212, 191, 0.25) !important;
    }

    .tier-platinum .rank-tier-icon {
      filter: drop-shadow(0 0 20px rgba(45, 212, 191, 0.5));
    }

    .tier-platinum .rank-level-row {
      background: rgba(45, 212, 191, 0.05);
      border: 1px solid rgba(45, 212, 191, 0.1);
      color: var(--lb-plat-text);
    }

    .tier-platinum .rank-xp-tag {
      color: var(--lb-plat-xp);
    }

    /* Diamond */
    .tier-diamond {
      background: linear-gradient(180deg, rgba(59, 130, 246, 0.08) 0%, var(--bg-card) 100%);
      box-shadow: 0 4px 24px rgba(59, 130, 246, 0.12);
    }

    .tier-diamond:hover {
      box-shadow: 0 12px 48px rgba(59, 130, 246, 0.25) !important;
    }

    .tier-diamond .rank-tier-icon {
      filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.5));
    }

    .tier-diamond .rank-level-row {
      background: rgba(59, 130, 246, 0.05);
      border: 1px solid rgba(59, 130, 246, 0.1);
      color: var(--lb-diam-text);
    }

    .tier-diamond .rank-xp-tag {
      color: var(--lb-diam-xp);
    }

    /* Legendary */
    .tier-legendary {
      background: linear-gradient(180deg, rgba(168, 85, 247, 0.12) 0%, var(--bg-card) 100%);
      box-shadow: 0 4px 24px rgba(168, 85, 247, 0.18);
    }

    .tier-legendary:hover {
      box-shadow: 0 12px 48px rgba(168, 85, 247, 0.35) !important;
    }

    .tier-legendary .rank-tier-icon {
      filter: drop-shadow(0 0 25px rgba(168, 85, 247, 0.7));
    }

    .tier-legendary .rank-level-row {
      background: rgba(168, 85, 247, 0.08);
      border: 1px solid rgba(168, 85, 247, 0.15);
      color: var(--lb-leg-text);
    }

    .tier-legendary .rank-xp-tag {
      color: var(--lb-leg-xp);
    }

    /* ============ LIGHT MODE FIXES ============ */
    [data-theme="light"] .lb-hero h1 {
      background: linear-gradient(135deg, #1e293b 20%, #b45309 55%, #1e293b 90%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    [data-theme="light"] .lb-hero p {
      color: #475569;
      opacity: 1;
    }

    [data-theme="light"] .lb-section-box {
      background: rgba(255, 255, 255, 0.85);
      border-color: rgba(0, 0, 0, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    [data-theme="light"] .lb-side-card {
      background: rgba(255, 255, 255, 0.85);
      border-color: rgba(0, 0, 0, 0.08);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    [data-theme="light"] .side-card-title {
      color: #1e293b;
    }

    [data-theme="light"] .side-card-title::before {
      color: #d97706;
    }

    [data-theme="light"] .my-stats-content {
      background: rgba(0, 0, 0, 0.03);
      border-color: rgba(0, 0, 0, 0.06);
    }

    [data-theme="light"] .lb-name {
      color: #1e293b;
    }

    [data-theme="light"] .lb-item {
      background: rgba(0, 0, 0, 0.02);
      border-color: rgba(0, 0, 0, 0.07);
    }

    [data-theme="light"] .lb-item:hover {
      background: rgba(0, 0, 0, 0.04);
      border-color: rgba(0, 0, 0, 0.12);
    }

    [data-theme="light"] .lb-item.rank-1 {
      background: linear-gradient(90deg, rgba(251, 191, 36, 0.15), rgba(251, 191, 36, 0.04));
      border-color: rgba(217, 119, 6, 0.4);
    }

    [data-theme="light"] .lb-item.rank-2 {
      background: linear-gradient(90deg, rgba(100, 116, 139, 0.12), rgba(100, 116, 139, 0.03));
      border-color: rgba(100, 116, 139, 0.35);
    }

    [data-theme="light"] .lb-item.rank-3 {
      background: linear-gradient(90deg, rgba(180, 83, 9, 0.1), rgba(180, 83, 9, 0.02));
      border-color: rgba(180, 83, 9, 0.35);
    }

    [data-theme="light"] .lb-rank-badge {
      background: rgba(0, 0, 0, 0.07);
      color: #1e293b;
    }

    [data-theme="light"] .lb-item.rank-2 .lb-rank-badge {
      background: linear-gradient(135deg, #94a3b8, #64748b);
      color: #fff;
    }

    [data-theme="light"] .lb-xp-val {
      color: #1e293b;
    }

    [data-theme="light"] .lb-xp-label {
      color: #64748b;
    }

    [data-theme="light"] .lb-item.rank-1 .lb-xp-val {
      color: #b45309;
    }

    [data-theme="light"] .lb-item.rank-2 .lb-xp-val {
      color: #475569;
    }

    [data-theme="light"] .lb-item.rank-3 .lb-xp-val {
      color: #b45309;
    }

    [data-theme="light"] .lb-item.rank-1 .lb-name {
      color: #b45309;
    }

    [data-theme="light"] .lb-tabs {
      background: rgba(0, 0, 0, 0.05);
      border-color: rgba(0, 0, 0, 0.08);
    }

    [data-theme="light"] .lb-tab {
      color: #64748b;
    }

    [data-theme="light"] .lb-tab:hover {
      background: rgba(0, 0, 0, 0.05);
      color: #1e293b;
    }

    [data-theme="light"] .lb-tab.active {
      background: linear-gradient(135deg, rgba(217, 119, 6, 0.15), rgba(0, 160, 200, 0.1));
      color: #1e293b;
      border-color: rgba(217, 119, 6, 0.4);
      box-shadow: 0 2px 8px rgba(217, 119, 6, 0.1);
    }

    [data-theme="light"] .lb-search input {
      background: rgba(0, 0, 0, 0.04);
      border-color: rgba(0, 0, 0, 0.1);
      color: #1e293b;
    }

    [data-theme="light"] .lb-search input::placeholder {
      color: rgba(0, 0, 0, 0.35);
    }

    [data-theme="light"] .lb-search input:focus {
      border-color: rgba(217, 119, 6, 0.5);
      background: rgba(0, 0, 0, 0.02);
      box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.1);
    }

    [data-theme="light"] .sidebar-rank-item {
      background: rgba(0, 0, 0, 0.03);
    }

    [data-theme="light"] .sidebar-rank-item:hover {
      background: rgba(0, 0, 0, 0.06);
      border-color: rgba(0, 0, 0, 0.1);
    }

    [data-theme="light"] .sidebar-rank-name {
      color: #1e293b;
    }

    [data-theme="light"] .sidebar-rank-xp {
      color: #64748b;
    }

    [data-theme="light"] .lb-hero::after {
      background: linear-gradient(90deg, transparent, rgba(217, 119, 6, 0.3), rgba(0, 160, 200, 0.2), transparent);
    }

    /* ============================================ */
  </style>
</head>

<body>
  <header class="site-header" id="header-container"></header>

  <section class="lb-hero">
    <div class="container lb-hero__content">
      <h1>Bảng Xếp Hạng</h1>
      <p>Nơi vinh danh những nhà thám hiểm kiệt xuất của WanderViệt.</p>
    </div>
  </section>

  <main class="lb-main">
    <div class="container lb-layout">
      <div class="lb-mobile-top-row">
        <!-- Column 1: Stats -->
        <div class="lb-side-card my-stats-card" style="margin-bottom: 0;">
          <h3 class="side-card-title">Thống kê của bạn</h3>
          <div id="myStatsContent" class="my-stats-content">
            <p style="color: var(--text-muted); font-size: 0.9rem;">Đang tải dữ liệu cá nhân...</p>
          </div>
        </div>

        <!-- Column 2: Rank System -->
        <div class="lb-side-card rank-info-card" style="margin-bottom: 0;">
          <h3 class="side-card-title">Hệ thống Cấp bậc</h3>
          <div id="ranksSidebar" class="ranks-sidebar-list">
            <!-- Dynamically filled by JS -->
          </div>
        </div>
      </div>

      <!-- Right Column: Unified Leaderboard -->
      <div class="lb-right">
        <!-- List Section -->
        <div class="lb-section-box">
          <div class="lb-card">
            <!-- Card Header -->
            <div class="lb-card-header">
              <div class="lb-tabs">
                <button class="lb-tab active">Mùa giải</button>
                <button class="lb-tab">Tất cả</button>
                <button class="lb-tab">Bạn bè</button>
              </div>
              
              <div style="display: flex; gap: 0.75rem; align-items: center;">
                <button class="lb-refresh-btn" id="lbRefreshBtn" title="Cập nhật dữ liệu">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                </button>
                
                <div class="lb-search">
                  <input type="text" id="lbSearchInput" placeholder="Tìm tên..." />
                </div>
              </div>
            </div>

            <div id="leaderboardList" class="lb-list">
              <div class="loading-wrap">
                <div class="loading-spinner"></div>
                <p>Đang tải dữ liệu...</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const list = document.getElementById('leaderboardList');
      const ranksSidebar = document.getElementById('ranksSidebar');

      // --- Render Rank Tiers Grid ---
      const rankTiersData = [
        { name: 'Đồng', class: 'tier-bronze', levels: [{ t: 'I', x: 0 }] },
        { name: 'Bạc', class: 'tier-silver', levels: [{ t: 'I', x: 300 }] },
        { name: 'Vàng', class: 'tier-gold', levels: [{ t: 'I', x: 1000 }] },
        { name: 'Bạch Kim', class: 'tier-platinum', levels: [{ t: 'I', x: 2000 }] },
        { name: 'Kim Cương', class: 'tier-diamond', levels: [{ t: 'I', x: 3200 }] },
        { name: 'Huyền Thoại', class: 'tier-legendary', levels: [{ t: 'Vô Song', x: 5000 }] }
      ];

      if (ranksSidebar) {
        ranksSidebar.innerHTML = rankTiersData.map(tier => `
          <div class="sidebar-rank-item ${tier.class}">
            <div style="display:flex; align-items:center; transform: scale(0.7); margin: -10px -15px;">
              ${WanderUI.getRankBadgeHTML(tier.name, tier.name === 'Huyền Thoại' ? '' : 'I')}
            </div>
            <div class="sidebar-rank-info">
              <div class="sidebar-rank-name">${tier.name}</div>
              <div class="sidebar-rank-xp">Từ ${tier.levels[0].x.toLocaleString()} XP</div>
            </div>
          </div>
        `).join('');
      }

      const showLoginPrompt = () => {
        if (!myStatsContent) return;
        myStatsContent.innerHTML = `
          <div style="padding: 1rem 0; color: var(--text-muted);">
            <div style="font-size: 2.5rem; margin-bottom: 1rem; filter: grayscale(1); opacity: 0.5;">👤</div>
            <p style="margin-bottom: 1.5rem; font-size: 0.95rem;">Đăng nhập để xem vị trí của bạn</p>
            <button class="btn btn--primary" style="width: 100%" data-auth-open>Tham gia ngay</button>
          </div>
        `;
      };

      let allUsers = [];
      let currentUserData = null;
      let currentDisplayedUsers = []; // Track which list is currently shown
      const myStatsContent = document.getElementById('myStatsContent');
      const token = localStorage.getItem('wander_token');
      function renderMyStats(user, globalRankNum = null) {
        if (!myStatsContent) return;

        const avatarHTML = user.avatar
          ? `<img src="${user.avatar}" style="width:100%;height:100%;object-fit:cover;">`
          : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;">👤</div>`;

        let avatarBlock = '';
        if (globalRankNum === 1) {
          avatarBlock = `
            <div class="lb-avatar-frame frame-gold" style="width: 80px; height: 80px; margin-bottom: 1rem; padding: 4px; border-radius: 24px;">
              <span class="lb-avatar-crown" style="font-size: 1.8rem; top: -24px;">👑</span>
              <div class="lb-avatar" style="border-radius: 20px;">${avatarHTML}</div>
            </div>`;
        } else if (globalRankNum === 2) {
          avatarBlock = `
            <div class="lb-avatar-frame frame-silver" style="width: 80px; height: 80px; margin-bottom: 1rem; padding: 4px; border-radius: 24px;">
              <div class="lb-avatar" style="border-radius: 20px;">${avatarHTML}</div>
            </div>`;
        } else if (globalRankNum === 3) {
          avatarBlock = `
            <div class="lb-avatar-frame frame-bronze" style="width: 80px; height: 80px; margin-bottom: 1rem; padding: 4px; border-radius: 24px;">
              <div class="lb-avatar" style="border-radius: 20px;">${avatarHTML}</div>
            </div>`;
        } else {
          avatarBlock = `
            <div style="width: 80px; height: 80px; border-radius: 24px; overflow: hidden; border: 3px solid var(--border); margin-bottom: 1rem; background: var(--bg-elevated); box-shadow: 0 10px 25px rgba(0,0,0,0.15);">
              ${avatarHTML}
            </div>`;
        }

        myStatsContent.innerHTML = `
          <div style="display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%;">
            ${avatarBlock}
            <h4 class="stats-user-name" style="font-size: 1.15rem; font-weight: 850; color: var(--text); margin-bottom: 0.25rem;">${user.displayName || user.name || 'Người dùng'}</h4>
            <div style="display:flex; align-items:center; gap:0.5rem; justify-content:center; margin-bottom: 1rem; opacity: 0.9;">
              <div style="transform: scale(0.7); margin: -15px -15px;">
                ${WanderUI.getRankBadgeHTML(user.rank || 'Đồng', user.rankTier || 'I')}
              </div>
              <div style="font-size: 0.9rem; font-weight: 800; color: #fff; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;">${user.rank || 'Đồng'} ${user.rankTier || 'I'}</div>
              ${globalRankNum ? `<div style="font-size: 0.8rem; font-weight: 800; color: #fff; background: linear-gradient(135deg, #3b82f6, #8b5cf6); padding: 4px 10px; border-radius: 8px; box-shadow: 0 2px 8px rgba(139, 92, 246, 0.4); white-space: nowrap;">Hạng #${globalRankNum}</div>` : ''}
            </div>
            <div style="font-size: 2rem; font-weight: 900; color: var(--text); letter-spacing: -0.05em;">${(user.points || 0).toLocaleString()} <span style="font-size:0.9rem; color:var(--text-muted); font-weight: 700;">XP</span></div>
          </div>
        `;
      }

      // --- Data Loading ---
      let cachedUser = null;
      try {
        const cachedStr = localStorage.getItem('wander_user');
        if (cachedStr) {
          cachedUser = JSON.parse(cachedStr);
          currentUserData = cachedUser;
          renderMyStats(currentUserData);
        }
      } catch (e) { }

      // Parallelized Loading
      const loadLB = () => {
        const sessionCached = sessionStorage.getItem('wv_cached_lb');
        if (sessionCached) {
          try {
            const data = JSON.parse(sessionCached);
            allUsers = data;
            allUsers.forEach((u, i) => u.originalRank = i + 1);
            renderLeaderboard(allUsers);
            if (currentUserData) {
              const myId = currentUserData._id || currentUserData.id;
              const idx = allUsers.findIndex(u => (u._id || u.id) === myId);
              if (idx !== -1) renderMyStats(currentUserData, idx + 1);
            }
          } catch (e) { }
        }

        const btn = document.getElementById('lbRefreshBtn');
        if (btn) btn.classList.add('spinning');
        
        Promise.all([
          fetch('/api/auth/user/me', { headers: { 'x-auth-token': token } }).then(r => r.json()),
          fetch('/api/auth/leaderboard').then(r => r.json())
        ]).then(([meRes, lbRes]) => {
          if (btn) btn.classList.remove('spinning');
          
          if (meRes.success) {
            currentUserData = meRes.user;
            localStorage.setItem('wander_user', JSON.stringify(currentUserData));
            renderMyStats(currentUserData);
          }

          if (lbRes.success) {
            allUsers = lbRes.leaderboard;
            allUsers.forEach((u, i) => u.originalRank = i + 1);
            sessionStorage.setItem('wv_cached_lb', JSON.stringify(allUsers));
            renderLeaderboard(allUsers);

            if (currentUserData) {
              const myId = currentUserData._id || currentUserData.id;
              const myIndex = allUsers.findIndex(u => (u._id || u.id) === myId);
              if (myIndex !== -1) renderMyStats(currentUserData, myIndex + 1);
            }
          }
          if (window.WanderUI && window.WanderUI.finishTopLoader) window.WanderUI.finishTopLoader();
        }).catch(err => {
          if (btn) btn.classList.remove('spinning');
          if (window.WanderUI && window.WanderUI.finishTopLoader) window.WanderUI.finishTopLoader();
          if (!allUsers.length) list.innerHTML = '<div class="loading-wrap"><p style="color:var(--danger);">❌ Lỗi kết nối máy chủ</p></div>';
        });
      };

      // Register refresh button click
      const refreshBtn = document.getElementById('lbRefreshBtn');
      if (refreshBtn) {
        refreshBtn.onclick = () => {
          loadLB();
          WanderUI.showToast("Đang cập nhật bảng xếp hạng...", "info");
        };
      }

      if (token) {
        loadLB();
      } else {
        showLoginPrompt();
        fetch('/api/auth/leaderboard').then(r => r.json()).then(lbRes => {
          if (lbRes.success) {
            allUsers = lbRes.leaderboard;
            allUsers.forEach((u, i) => u.originalRank = i + 1);
            renderLeaderboard(allUsers);
          }
          if (window.WanderUI && window.WanderUI.finishTopLoader) window.WanderUI.finishTopLoader();
        }).catch(() => {
          if (window.WanderUI && window.WanderUI.finishTopLoader) window.WanderUI.finishTopLoader();
        });
      }

      function renderLeaderboard(users, isSearch = false) {
        if (!isSearch) {
          currentDisplayedUsers = users; // Always track what's currently shown
        }

        if (!users.length) {
          list.innerHTML = '<div class="loading-wrap"><p>Không tìm thấy nhà thám hiểm nào</p></div>';
          return;
        }

        list.innerHTML = '';

        // Unified Leaderboard Rendering
        users.forEach((u, idx) => {
          const rankNum = isSearch ? (u.originalRank || idx + 1) : (idx + 1);
          const r = u.rank || 'Đồng';
          const item = document.createElement('div');

          let rankClass = '';
          if (rankNum === 1) rankClass = 'rank-1';
          else if (rankNum === 2) rankClass = 'rank-2';
          else if (rankNum === 3) rankClass = 'rank-3';

          item.className = `lb-item ${rankClass}`;
          item.style.animationDelay = `${idx * 0.05}s`;
          item.onclick = () => {
            window.location.href = `/profile.html?id=${u._id || u.id}`;
          };

          const avatarHTML = u.avatar

            ? `<img src="${u.avatar}" alt="Avatar">`
            : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:1.2rem;">👤</div>`;

          let avatarBlock = '';
          if (rankNum === 1) {
            avatarBlock = `
              <div class="lb-avatar-frame frame-gold">
                <span class="lb-avatar-crown">👑</span>
                <div class="lb-avatar">${avatarHTML}</div>
              </div>`;
          } else if (rankNum === 2) {
            avatarBlock = `<div class="lb-avatar-frame frame-silver"><div class="lb-avatar">${avatarHTML}</div></div>`;
          } else if (rankNum === 3) {
            avatarBlock = `<div class="lb-avatar-frame frame-bronze"><div class="lb-avatar">${avatarHTML}</div></div>`;
          } else {
            avatarBlock = `<div class="lb-avatar-plain">${u.avatar ? `<img src="${u.avatar}" alt="Avatar">` : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:1.2rem;">👤</div>`}</div>`;
          }

          item.innerHTML = `
            <div class="lb-rank-badge">${rankNum}</div>
            ${avatarBlock}
            <div class="lb-info">
              <span class="lb-name">${u.displayName || u.name}</span>
            </div>
            <div class="lb-tier-col">
              <div style="transform: scale(0.75); transform-origin: center; flex-shrink: 0;">
                ${WanderUI.getRankBadgeHTML(r, u.rankTier)}
              </div>
            </div>
            <div class="lb-xp">
              <div class="lb-xp-chip">
                <span class="lb-xp-val">${u.points.toLocaleString()}</span>
                <span class="lb-xp-label">XP</span>
              </div>
            </div>
          `;
          list.appendChild(item);
        });
      }

      // --- Search Implementation ---
      const searchInput = document.getElementById('lbSearchInput');
      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          const q = e.target.value.toLowerCase().trim();
          if (!q) {
            renderLeaderboard(currentDisplayedUsers.length ? currentDisplayedUsers : allUsers, false);
            return;
          }
          // Always search within the currently displayed list (respects active tab)
          const baseList = currentDisplayedUsers.length ? currentDisplayedUsers : allUsers;
          const filtered = baseList.filter(u =>
            (u.displayName || u.name || '').toLowerCase().includes(q)
          );
          // Pass isSearch = true to preserve original ranks and avoid overwriting currentDisplayedUsers
          renderLeaderboard(filtered, true);
        });
      }

      // --- Tabs Implementation ---
      const tabs = document.querySelectorAll('.lb-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');

          const text = tab.textContent.trim();
          if (text === 'Mùa giải') {
            renderLeaderboard(allUsers);
          } else if (text === 'Tất cả') {
            renderLeaderboard(allUsers);
            WanderUI.showToast("Đang hiển thị bảng xếp hạng tổng quát", "info");
          } else if (text === 'Bạn bè') {
            const token = localStorage.getItem('wander_token');
            if (!token) {
              WanderUI.showToast("Vui lòng đăng nhập để xem bạn bè", "warning");
              return;
            }
            list.innerHTML = '<div class="loading-wrap"><div class="loading-spinner"></div><p>Đang tìm kiếm bạn bè...</p></div>';

            fetch('/api/social/friends', { headers: { 'x-auth-token': token } })
              .then(res => res.json())
              .then(data => {
                if (data.success) {
                  let friendsList = data.data || [];
                  // Add current user to the list
                  if (currentUserData) {
                    const myId = currentUserData._id || currentUserData.id;
                    if (!friendsList.find(f => (f._id || f.id) === myId || (f.customId && f.customId === currentUserData.customId))) {
                      friendsList.push(currentUserData);
                    }
                  }
                  // Sort by points
                  friendsList.sort((a, b) => (b.points || 0) - (a.points || 0));
                  friendsList.forEach((u, i) => u.originalRank = i + 1);
                  renderLeaderboard(friendsList);

                  if (friendsList.length <= 1) {
                    WanderUI.showToast("Bạn chưa kết nối với nhà thám hiểm nào", "info");
                  }
                } else {
                  list.innerHTML = '<div style="text-align:center; padding: 4rem 2rem; opacity: 0.5;">Không thể tải danh sách bạn bè.</div>';
                }
              })
              .catch(err => {
                list.innerHTML = '<div style="text-align:center; padding: 4rem 2rem; opacity: 0.5;">Lỗi kết nối khi tải bạn bè.</div>';
              });
          }
        });
      });
    });

    // Track quest activity: Xem bảng xếp hạng
    try {
      var qa = JSON.parse(localStorage.getItem('wv_quest_activity') || '{}');
      qa.socLeaderboard = 1;
      localStorage.setItem('wv_quest_activity', JSON.stringify(qa));
    } catch (e) { }
  </script>
  <script src="SharedUI.js?v=1777335000020"></script>
  <script src="chat-brain.js"></script>
  <script src="main.js?v=1777307000000" defer></script>
